name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  APP_ENV: test
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432
  POSTGRES_USER: user
  POSTGRES_PASSWORD: password
  POSTGRES_DB: gym_test
  SECRET_KEY: supersecretkeyfortesting123456
  KIOSK_SIGNING_KEY: anotherlongtestsecret123456
  CI: true
  PAYROLL_AUTO_ENABLED: false

jobs:
  backend-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: gym_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d gym_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run backend smoke tests
        run: pytest -q tests/test_auth.py tests/test_password_reset.py tests/test_audit_security.py tests/test_performance_smoke.py

  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint:web

      - name: Run frontend typecheck
        run: npm run typecheck:web

      - name: Run frontend i18n verification
        run: npm run i18n:check:strict --workspace frontend

      - name: Run frontend production build
        run: npm run build --workspace frontend

  image-build:
    runs-on: ubuntu-latest
    needs:
      - backend-smoke
      - frontend-quality
    steps:
      - uses: actions/checkout@v6

      - name: Build backend image
        run: docker build -t gym-erp-backend:${{ github.sha }} .

      - name: Build frontend image
        run: docker build -t gym-erp-frontend:${{ github.sha }} -f frontend/Dockerfile .

  compose-smoke:
    runs-on: ubuntu-latest
    needs:
      - image-build
    steps:
      - uses: actions/checkout@v6

      - name: Create CI env file
        run: |
          cat > .env <<'EOF'
          APP_ENV=test
          POSTGRES_USER=user
          POSTGRES_PASSWORD=password
          POSTGRES_DB=gym_test
          POSTGRES_HOST=db
          POSTGRES_PORT=5432
          SECRET_KEY=supersecretkeyfortesting123456
          KIOSK_SIGNING_KEY=anotherlongtestsecret123456
          BACKEND_CORS_ORIGINS=["http://localhost:3000","http://localhost:8000"]
          NEXT_PUBLIC_KIOSK_ID=kiosk-01
          PAYROLL_AUTO_ENABLED=false
          EOF

      - name: Start database
        run: docker compose up -d db

      - name: Wait for database
        run: |
          for attempt in {1..30}; do
            if docker compose exec -T db pg_isready -U user -d gym_test; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Run migrations
        env:
          POSTGRES_HOST: db
        run: docker compose run --rm backend alembic upgrade head

      - name: Start application stack
        env:
          POSTGRES_HOST: db
        run: docker compose up -d backend frontend

      - name: Verify backend health
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/healthz; then
              exit 0
            fi
            sleep 5
          done
          exit 1

      - name: Verify frontend page
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/login > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          exit 1

      - name: Shut down stack
        if: always()
        run: docker compose down -v

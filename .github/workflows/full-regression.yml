name: Full Regression

on:
  workflow_dispatch:

concurrency:
  group: full-regression-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  APP_ENV: test
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432
  POSTGRES_USER: user
  POSTGRES_PASSWORD: password
  POSTGRES_DB: gym_test
  SECRET_KEY: supersecretkeyfortesting123456
  KIOSK_SIGNING_KEY: anotherlongtestsecret123456
  CI: true
  PAYROLL_AUTO_ENABLED: false

jobs:
  backend-full-suite:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: gym_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d gym_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run full backend test suite
        run: pytest -q

  frontend-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Create regression env file
        run: |
          cat > .env <<'EOF'
          APP_ENV=development
          POSTGRES_USER=user
          POSTGRES_PASSWORD=password
          POSTGRES_DB=gym_test
          POSTGRES_HOST=db
          POSTGRES_PORT=5432
          SECRET_KEY=supersecretkeyfortesting123456
          KIOSK_SIGNING_KEY=anotherlongtestsecret123456
          BACKEND_CORS_ORIGINS=["http://localhost:3000","http://localhost:8000"]
          NEXT_PUBLIC_KIOSK_ID=kiosk-01
          PAYROLL_AUTO_ENABLED=false
          EOF

      - name: Start database
        run: docker compose up -d db

      - name: Wait for database
        run: |
          for attempt in {1..30}; do
            if docker compose exec -T db pg_isready -U user -d gym_test; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Run migrations
        env:
          POSTGRES_HOST: db
        run: docker compose run --rm backend alembic upgrade head

      - name: Seed demo data
        env:
          POSTGRES_HOST: db
        run: docker compose run --rm backend python -m app.seed_demo_data

      - name: Run backend branching regression tests
        env:
          POSTGRES_HOST: db
        run: docker compose run --rm backend python -m pytest tests/test_branching_regression.py -q

      - name: Start application stack
        env:
          POSTGRES_HOST: db
        run: docker compose up -d backend frontend

      - name: Wait for backend health
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/healthz; then
              exit 0
            fi
            sleep 5
          done
          exit 1

      - name: Wait for frontend login page
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/login > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          exit 1

      - name: Run frontend smoke e2e
        run: npm run test:e2e:fast --workspace frontend

      - name: Shut down stack
        if: always()
        run: docker compose down -v

  security-audit:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: gym_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d gym_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Install workspace dependencies
        run: npm ci

      - name: Generate app security audit report
        run: python -m app.security_audit.cli

      - name: Generate backend dependency audit report
        run: |
          mkdir -p reports
          pip-audit \
            --ignore-vuln GHSA-wj6h-64fc-37mp \
            -r requirements.txt \
            -f json \
            -o reports/backend-dependency-audit.json

      - name: Generate frontend dependency audit report
        working-directory: frontend
        run: |
          mkdir -p reports
          set +e
          npm audit --json --omit=dev > reports/dependency-audit.json
          status=$?
          set -e
          if [ "$status" -gt 1 ]; then
            exit "$status"
          fi

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            reports/security-audit.json
            reports/backend-dependency-audit.json
            frontend/reports/dependency-audit.json

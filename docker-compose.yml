services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gym_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_now}
      POSTGRES_DB: ${POSTGRES_DB:-gym_erp_db}
    ports:
      - "${POSTGRES_EXPOSE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gym_admin} -d ${POSTGRES_DB:-gym_erp_db}"]
      interval: 3s
      timeout: 3s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE:-gym-erp-backend:local}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-development}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-gym_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_now}
      POSTGRES_DB: ${POSTGRES_DB:-gym_erp_db}
      SECRET_KEY: ${SECRET_KEY:-change_me_to_a_long_random_secret}
      KIOSK_SIGNING_KEY: ${KIOSK_SIGNING_KEY:-change_me_to_a_long_random_kiosk_secret}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-["http://localhost:3000","http://127.0.0.1:3000"]}
      SUBSCRIPTION_AUTO_ENABLED: ${SUBSCRIPTION_AUTO_ENABLED:-true}
      SUBSCRIPTION_AUTO_INTERVAL_HOURS: ${SUBSCRIPTION_AUTO_INTERVAL_HOURS:-6}
      RESET_LOCAL_ADMIN_ON_STARTUP: ${RESET_LOCAL_ADMIN_ON_STARTUP:-true}
      DEMO_SEED_ON_STARTUP: ${DEMO_SEED_ON_STARTUP:-true}
      BACKGROUND_TASKS_ENABLED_IN_TESTS: ${BACKGROUND_TASKS_ENABLED_IN_TESTS:-false}
      NEXT_PUBLIC_KIOSK_ID: ${NEXT_PUBLIC_KIOSK_ID:-kiosk-01}
    ports:
      - "${BACKEND_EXPOSE_PORT:-8000}:8000"
    volumes:
      - static_data:/app/static
      - ./alembic:/app/alembic
      - ./app:/app/app
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    image: ${FRONTEND_IMAGE:-gym-erp-frontend:local}
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8000}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8000}
      NEXT_PUBLIC_KIOSK_ID: ${NEXT_PUBLIC_KIOSK_ID:-kiosk-01}
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "${FRONTEND_EXPOSE_PORT:-3000}:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/login').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1));"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  static_data:
